            example: ALDH2
          name:
            type: string
            example: aldehyde dehydrogenase 2 family member
          alias_of:
            type: string
            example: null
          highlight:
            type: string
            example: <em>ALDH2</em>

    SearchDisease:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            example: MONDO_0003582
          cui:
            type: string
            example: C0677776
          label:
            type: string
            example: Hereditary breast and ovarian cancer syndrome
          highlight:
            type: string
            example: Hereditary <em>breast</em> and <em>ovarian</em> <em>cancer</em> syndrome

    InspectDisease:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            example: MONDO_0003582
          cui:
            type: string
            example: C0677776
          label:
            type: string
            example: Hereditary breast and ovarian cancer syndrome
          root:
            type: boolean
            example: false
          leaf:
            type: boolean
            example: false
          parents:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                  example: MONDO_0016248
                cui:
                  type: string
                  example: CN201036
                label:
                  type: string
                  example: Familial ovarian cancer
                root:
                  type: boolean
                  example: false
          children:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                  example: MONDO_0012933
                cui:
                  type: string
                  example: C2675520
                label:
                  type: string
                  example: Breast-ovarian cancer, familial 2
                leaf:
                  type: boolean
                  example: true

    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
            example: 'error message'

  examples:
    SearchVariant-1:
      summary: List variants whose class is any of insertion, deletion and indel.
      value:
        query:
          type:
            relation: eq
            terms:
              - ins
              - del
              - indel

    SearchVariant-2:
      summary: List variants by identifiers (tgv, rs)
      value:
        query:
          id:
            - tgv421843
            - rs114202595

    SearchVariant-3:
      summary: List variants exist on an exact position
      value:
        query:
          location:
            chromosome: '16'
            position: 48258198

    SearchVariant-4:
      summary: List variants exist in a certain range
      value:
        query:
          location:
            chromosome: '10'
            position:
              gte: 73270743
              lte: 73376976

    SearchVariant-5:
      summary: List variants range from 0.05 to 0.95 in frequency in JGA-WES.
      value:
        query:
          or:
            - frequency:
                dataset:
                  name: jga_wes
                frequency:
                  gte: 0
                  lte: 0.05
                filtered: true
            - frequency:
                dataset:
                  name: jga_wes
                frequency:
                  gte: 0.95
                  lte: 1.0
                filtered: true

    SearchVariant-6:
      summary: List variants by genotype count.
      value:
        query:
          frequency:
            genotype:
              key: aac
              count:
                gte: 5
            filtered: true

    SearchVariant-7:
      summary: List variants exist on ALDH2 (Aldehyde Dehydrogenase 2 family member).
      value:
        query:
          gene:
            relation: eq
            terms:
              - 404

    SearchVariant-8:
      summary: List variants associated with C2675520 (Breast-ovarian cancer, familial 2).
      value:
        query:
          disease:
            relation: eq
            terms:
              - C2675520

    SearchVariant-9:
      summary: List variants associated with MONDO_0003582 (hereditary breast ovarian cancer syndrome).
      value:
        query:
          disease:
            relation: eq
            terms:
              - MONDO_0003582

    SearchVariant-10:
      summary: Paginate result over 10,000 records.
      value:
        offset:
          - '12'
          - '112204719'
          - G
          - A
        limit: 100

    SearchVariant-11:
      summary: List variants by prediction score
      value:
        query:
          and:
            - sift:
                score:
                  gte: 0
                  lt: 0.05
            - polyphen:
                score:
                  gt: 0.908
                  lte: 1
            - alphamissense:
                score:
                  gt: 0.564
                  lte: 1

    SearchVariant-12:
      summary: List variants by prediction score unassigned or unknown
      value:
        query:
          and:
            - sift:
                score:
                  - unassigned
            - polyphen:
                score:
                  - unassigned
                  - unknown
            - alphamissense:
                score:
                  - unassigned
